<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="AprilThumb — ChatGPT·Gemini prompts for 16 disciplines, 6 languages" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf7f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="AprilThumb" />
    <meta property="og:description" content="Copy prompts for ChatGPT and Gemini — 16 disciplines, 6 languages" />
    <meta property="og:url" content="https://aprilstumb.vercel.app/" />
    <meta property="og:type" content="website" />
    <title>AprilThumb</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="hero">
      <div class="wrap">
        <p class="hero-label" id="hero-label">ChatGPT · Gemini</p>
        <h1 id="site-title">AprilThumb</h1>
        <p class="header-selection" id="header-selection" hidden aria-live="polite"></p>
        <div class="header-actions" id="header-actions" hidden>
          <button type="button" class="btn-ghost" id="btn-change-lang"></button>
          <button type="button" class="btn-ghost" id="btn-change-track"></button>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section id="landing" class="landing" aria-label="Selection">
        <h2 class="landing-title" id="landing-title"></h2>
        <div class="panel">
          <h3 class="panel-label" id="landing-langs-label"></h3>
          <div class="lang-row" id="lang-row"></div>
        </div>
        <div class="panel panel-tracks" id="panel-tracks">
          <h3 class="panel-label" id="landing-tracks-label"></h3>
          <p class="panel-hint" id="landing-tracks-hint" hidden></p>
          <div class="track-grid" id="track-grid"></div>
        </div>
        <button type="button" class="btn-enter" id="btn-enter" disabled></button>
      </section>

      <div id="app-view" hidden>
        <article id="guide" class="guide" aria-label="Guide"></article>
        <section class="prompts" aria-label="Prompt list">
          <h2 class="prompts-label" id="prompts-label"></h2>
          <div id="app"></div>
        </section>
      </div>
    </main>

    <footer class="footer wrap">
      <p id="footer-text"></p>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
