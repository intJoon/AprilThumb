<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="AprilThumb — ChatGPT·Gemini prompts for 24 disciplines, 6 languages" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf7f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="AprilThumb" />
    <meta property="og:description" content="Copy prompts for ChatGPT and Gemini — 24 disciplines, 6 languages" />
    <meta property="og:url" content="https://aprilstumb.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:image" content="https://aprilstumb.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AprilThumb — ChatGPT and Gemini prompts for 24 disciplines" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AprilThumb" />
    <meta name="twitter:description" content="Copy prompts for ChatGPT and Gemini — 24 disciplines, 6 languages" />
    <meta name="twitter:image" content="https://aprilstumb.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="AprilThumb — ChatGPT and Gemini prompts for 24 disciplines" />
    <title>AprilThumb</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="hero">
      <div class="wrap">
        <p class="hero-label" id="hero-label">ChatGPT · Gemini</p>
        <h1 id="site-title">AprilThumb</h1>
        <div class="header-actions">
          <button type="button" class="btn-ghost is-empty" id="btn-change-lang" aria-haspopup="true" aria-controls="picker">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
              <path d="M3 12h18M12 3c2.5 2.8 3.8 5.8 3.8 9s-1.3 6.2-3.8 9M12 3c-2.5 2.8-3.8 5.8-3.8 9s1.3 6.2 3.8 9" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span class="btn-label" id="btn-label-lang"></span>
          </button>
          <button type="button" class="btn-ghost is-empty" id="btn-change-track" aria-haspopup="true" aria-controls="picker">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span class="btn-label" id="btn-label-track"></span>
          </button>
          <button type="button" class="btn-ghost btn-ghost--icon" id="btn-copy-link">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="btn-label" id="btn-label-copy" hidden></span>
          </button>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section id="picker" class="picker" hidden role="region" aria-labelledby="picker-label">
        <h2 class="picker-label" id="picker-label"></h2>
        <div id="picker-options" role="group" aria-labelledby="picker-label"></div>
      </section>

      <div id="app-view" hidden>
        <article id="guide" class="guide"></article>
        <section class="prompts">
          <h2 class="prompts-label" id="prompts-label"></h2>
          <div id="app"></div>
        </section>
      </div>
    </main>

    <footer class="footer wrap">
      <p id="footer-text"></p>
    </footer>

    <section id="feedback-section" class="feedback-section wrap" hidden>
      <details class="feedback-disclosure" id="feedback-disclosure">
        <summary class="feedback-summary">
          <span id="feedback-summary-label"></span>
          <svg class="feedback-chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </summary>
        <div class="feedback-inner">
          <div class="feedback-compose">
            <form id="feedback-form" class="comment-form" autocomplete="off">
              <p class="comment-context" id="feedback-meta"></p>
              <label class="sr-only" for="feedback-body" id="label-feedback-body"></label>
              <div class="comment-input-wrap">
                <textarea
                  id="feedback-body"
                  class="comment-input"
                  rows="1"
                  maxlength="500"
                  required
                ></textarea>
                <span class="comment-char-count" id="feedback-char-count" aria-live="polite"></span>
              </div>
              <div class="comment-form-actions">
                <button type="submit" class="btn-submit" id="btn-feedback-submit"></button>
              </div>
              <input type="text" name="website" class="comment-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true" />
            </form>
          </div>
          <div class="feedback-divider" role="separator" aria-hidden="true"></div>
          <div class="feedback-feed" id="feedback-feed">
            <p class="feedback-status feedback-loading" id="feedback-loading" hidden></p>
            <div class="feedback-status feedback-error" id="feedback-error" hidden>
              <p class="feedback-error-text" id="feedback-error-text"></p>
              <button type="button" class="btn-retry" id="btn-feedback-retry"></button>
            </div>
            <ul id="feedback-list" class="comments-list"></ul>
            <p class="comments-empty" id="feedback-empty" hidden></p>
          </div>
        </div>
      </details>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
