<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="AprilThumb — ChatGPT·Gemini prompts for 16 disciplines, 6 languages" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf7f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="AprilThumb" />
    <meta property="og:description" content="Copy prompts for ChatGPT and Gemini — 16 disciplines, 6 languages" />
    <meta property="og:url" content="https://aprilstumb.vercel.app/" />
    <meta property="og:type" content="website" />
    <title>AprilThumb</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="hero">
      <div class="wrap">
        <p class="hero-label" id="hero-label">ChatGPT · Gemini</p>
        <h1 id="site-title">AprilThumb</h1>
        <div class="header-actions">
          <button type="button" class="btn-ghost is-empty" id="btn-change-lang" aria-haspopup="listbox"></button>
          <button type="button" class="btn-ghost is-empty" id="btn-change-track" aria-haspopup="listbox"></button>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section id="tutorial" class="tutorial" hidden aria-label="Getting started">
        <div class="tutorial-aim" aria-hidden="true">
          <span class="tutorial-aim-mark">↑</span>
          <span class="tutorial-aim-mark">↑</span>
        </div>
        <div class="tutorial-steps">
          <button type="button" class="tutorial-step" id="tutorial-step-lang">
            <span class="tutorial-num">1</span>
            <svg class="tutorial-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
              <path d="M3 12h18M12 3c2.5 2.8 3.8 5.8 3.8 9s-1.3 6.2-3.8 9M12 3c-2.5 2.8-3.8 5.8-3.8 9s1.3 6.2 3.8 9" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span class="tutorial-hint" id="tutorial-hint-lang"></span>
          </button>
          <span class="tutorial-arrow" aria-hidden="true">→</span>
          <button type="button" class="tutorial-step" id="tutorial-step-track">
            <span class="tutorial-num">2</span>
            <svg class="tutorial-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span class="tutorial-hint" id="tutorial-hint-track"></span>
          </button>
        </div>
        <p class="tutorial-note" id="tutorial-note" hidden></p>
      </section>

      <section id="picker" class="picker" hidden aria-label="Selection">
        <h2 class="picker-label" id="picker-label"></h2>
        <div id="picker-options"></div>
      </section>

      <div id="app-view" hidden>
        <article id="guide" class="guide" aria-label="Guide"></article>
        <section class="prompts" aria-label="Prompt list">
          <h2 class="prompts-label" id="prompts-label"></h2>
          <div id="app"></div>
        </section>
      </div>
    </main>

    <footer class="footer wrap">
      <p id="footer-text"></p>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
