<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf7f2" />
    <meta name="robots" content="noindex" />
    <title>AprilThumb</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <style>
      .not-found {
        box-sizing: border-box;
        width: 100%;
        min-height: min(70dvh, calc(100dvh - 3rem));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1rem;
        padding: 2.5rem 0 4rem;
      }
      .not-found-code {
        margin: 0;
        font-family: "Source Serif 4", Georgia, serif;
        font-size: clamp(3.75rem, 22vw, 5.25rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--accent);
      }
      .not-found h1 {
        margin: 0;
        width: 100%;
        max-width: min(100%, 26rem);
        font-family: "Source Serif 4", "Pretendard", "Noto Sans KR", Georgia, serif;
        font-size: clamp(1.35rem, 4.8vw, 1.85rem);
        font-weight: 700;
        line-height: 1.35;
        word-break: keep-all;
        overflow-wrap: normal;
      }
      .not-found-body {
        margin: 0;
        width: 100%;
        max-width: min(100%, 26rem);
        color: var(--muted);
        line-height: 1.55;
        word-break: keep-all;
        overflow-wrap: normal;
      }
      :lang(ko) .not-found h1,
      :lang(ja) .not-found h1,
      :lang(zh) .not-found h1 {
        letter-spacing: 0;
        font-family: "Pretendard", "Noto Sans KR", "Noto Sans JP", "Noto Sans SC", system-ui, sans-serif;
      }
      .not-found-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 0.5rem;
        width: 100%;
        max-width: 22rem;
      }
      .not-found-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.55rem 1.1rem;
        border-radius: var(--radius-sm);
        font-weight: 600;
        text-decoration: none;
        background: var(--accent);
        color: #fff;
      }
      .not-found-actions a:hover {
        background: var(--accent-hover);
      }
      .not-found-actions a.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--border);
      }
      .not-found-actions a.secondary:hover {
        background: var(--accent-soft);
      }
      @media (max-width: 480px) {
        .not-found-actions {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <main class="wrap not-found">
      <p class="not-found-code" id="not-found-code"></p>
      <h1 id="not-found-heading"></h1>
      <p class="not-found-body" id="not-found-body"></p>
      <div class="not-found-actions">
        <a href="/" id="not-found-back"></a>
        <a class="secondary" href="/" id="not-found-retry"></a>
      </div>
    </main>
    <script src="/not-found.js" type="module"></script>
    <script>
      document.getElementById("not-found-retry").addEventListener("click", (e) => {
        e.preventDefault();
        location.reload();
      });
    </script>
  </body>
</html>
